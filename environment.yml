# Conda environment for the CoTFormer project on Iridis X.
#
# Pinned to match the M1 reproduction baseline (PyTorch 2.2 / CUDA 11.8)
# plus the M2 analytic sub-stream packages (scikit-learn, pingouin,
# statsmodels, muon-optimizer). The resolved lockfile lives in
# environment.lock.yml; the lockfile is rebuilt on the Iridis login
# node by Abe prior to each HPC submission wave, not by automated
# agents. See docs/extend-technical.md §4.1 "Conda environment freeze"
# for the authoritative pin table.
#
# Usage (login node only, internet required):
#   conda env create -f environment.yml -p /scratch/$USER/cotformer-env
#   conda activate /scratch/$USER/cotformer-env
#   pip install --no-deps git+https://github.com/KellerJordan/Muon
#   conda env export --no-builds > environment.lock.yml
#
# Compute nodes load the frozen env via iridis/env.sh (source of truth).

name: cotformer-env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # PyTorch 2.2 / CUDA 11.8 pin: ABI-compatible with numpy<2.
  - pytorch::pytorch=2.2.*=py3.10_cuda11.8*
  - pytorch::torchvision=0.17.*
  - pytorch::torchaudio=2.2.*
  - pytorch::pytorch-cuda=11.8
  # Numerics. numpy<2 is hard: PyTorch 2.2 uses the NumPy 1 C-API and
  # torch.from_numpy crashes on NumPy 2.x (see docs/reprod-notes.md).
  - numpy<2
  - scipy>=1.11
  # Analysis statistics (M2 protocols).
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - pingouin>=0.5
  # Serialisation and dataset plumbing.
  - orjson
  - tiktoken
  - zstandard
  - tqdm=4.65.0
  - einops
  # Plotting.
  - matplotlib
  - seaborn
  # Model utilities.
  - transformers
  - wandb
  # Pip-only dependencies (installed after conda env creation).
  - pip
  - pip:
    - ptflops
    # Muon optimiser fallback for the Tuned Lens training recipe per
    # DEC-M2-017 (canonical SGD + Nesterov, muon as fallback). The pip
    # spec uses the upstream GitHub repo so the lockfile records the
    # exact commit at resolution time.
    - git+https://github.com/KellerJordan/Muon@main#egg=muon-optimizer
